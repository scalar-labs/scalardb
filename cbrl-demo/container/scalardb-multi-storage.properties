# ScalarDB multi-storage configuration for the CBRL demo — PRIMARY targets.
#
# This variant is baked into the app container image and points at the compose
# SERVICE hostnames on the internal network (mysql:3306 / postgres:5432), NOT the
# host ports. The demo runs entirely inside the isolated compose project, so nothing
# is published to the host.
#
# Layout:
#   transfer     (service, user data)  -> MySQL      (service "mysql")
#   transfer_pg  (service, user data)  -> PostgreSQL (service "postgres")
#   coordinator  (Consensus Commit state + CBRL redo/backup) -> PostgreSQL
#   default_storage                    -> PostgreSQL (anything unmapped)

# Consensus Commit is required for multi-storage transactions.
scalar.db.transaction_manager=consensus-commit

# Use the multi-storage storage implementation.
scalar.db.storage=multi-storage

# Storage names referenced by namespace_mapping below.
scalar.db.multi_storage.storages=mysql,postgres

# --- "mysql" storage (JDBC / MySQL, compose service "mysql") ---
scalar.db.multi_storage.storages.mysql.storage=jdbc
scalar.db.multi_storage.storages.mysql.contact_points=jdbc:mysql://mysql:3306/
scalar.db.multi_storage.storages.mysql.username=root
scalar.db.multi_storage.storages.mysql.password=mysql

# --- "postgres" storage (JDBC / PostgreSQL, compose service "postgres") ---
scalar.db.multi_storage.storages.postgres.storage=jdbc
scalar.db.multi_storage.storages.postgres.contact_points=jdbc:postgresql://postgres:5432/postgres
scalar.db.multi_storage.storages.postgres.username=postgres
scalar.db.multi_storage.storages.postgres.password=postgres

# Namespace -> storage mapping. Each cross-storage transfer debits an account in
# "transfer" (MySQL) and credits one in "transfer_pg" (PostgreSQL) in a single
# ScalarDB transaction, so every commit spans both service storages plus the
# coordinator state in PG; the conserved-total invariant spans both databases.
scalar.db.multi_storage.namespace_mapping=transfer:mysql,transfer_pg:postgres,coordinator:postgres

# Default storage for any namespace without an explicit mapping.
scalar.db.multi_storage.default_storage=postgres

# SNAPSHOT isolation is enough for the balance-transfer invariant.
scalar.db.consensus_commit.isolation_level=SNAPSHOT

# Enable cross-partition scans (multi-storage propagates this global flag to every
# sub-storage). CbrlRestore scans the whole coordinator.state table via ScanAll.
scalar.db.cross_partition_scan.enabled=true

# --- CBRL backup-mode knobs (consumed by the transaction manager's BackupModeDaemon) ---
# The daemon scans coordinator.backup every check_interval_millis and flips redo
# logging on for the BACKING_UP label it finds. Kept small so the cache-wait after
# opening a window is short.
scalar.db.consensus_commit.backup.check_interval_millis=2000
