# ScalarDB multi-storage configuration for the CBRL demo — RESTORE COPY targets.
#
# Identical namespace layout to scalardb-multi-storage.properties, but pointing at the
# COPY compose services (mysql-copy:3306 / postgres-copy:5432). The physical backups of
# the primaries are restored into these copy servers under the SAME database/schema
# names, so CbrlRestore — which routes each record by the namespace name carried in its
# redo — repairs the copy in place.

scalar.db.transaction_manager=consensus-commit
scalar.db.storage=multi-storage
scalar.db.multi_storage.storages=mysql,postgres

# --- "mysql" storage (JDBC / MySQL copy, compose service "mysql-copy") ---
scalar.db.multi_storage.storages.mysql.storage=jdbc
scalar.db.multi_storage.storages.mysql.contact_points=jdbc:mysql://mysql-copy:3306/
scalar.db.multi_storage.storages.mysql.username=root
scalar.db.multi_storage.storages.mysql.password=mysql

# --- "postgres" storage (JDBC / PostgreSQL copy, compose service "postgres-copy") ---
scalar.db.multi_storage.storages.postgres.storage=jdbc
scalar.db.multi_storage.storages.postgres.contact_points=jdbc:postgresql://postgres-copy:5432/postgres
scalar.db.multi_storage.storages.postgres.username=postgres
scalar.db.multi_storage.storages.postgres.password=postgres

scalar.db.multi_storage.namespace_mapping=transfer:mysql,transfer_pg:postgres,coordinator:postgres
scalar.db.multi_storage.default_storage=postgres

scalar.db.consensus_commit.isolation_level=SNAPSHOT

# CbrlRestore scans the whole coordinator.state table (a cross-partition ScanAll) to read
# the redo, so the underlying storages must permit cross-partition scans. Multi-storage
# propagates this global flag to every sub-storage.
scalar.db.cross_partition_scan.enabled=true

# Kept identical to the primary so the daemon/timeouts match.
scalar.db.consensus_commit.backup.check_interval_millis=2000
