blobstorage:
  - label: blob-storage
    label_pretty: Blob Storage
    setup_env: docker run -d -e AZURITE_ACCOUNTS=test:test -p 10000:10000 mcr.microsoft.com/azure-storage/azurite
    test: |
      az storage container create \
            --name test-container \
            --connection-string "DefaultEndpointsProtocol=http;AccountName=test;AccountKey=test;BlobEndpoint=http://localhost:10000/test;"
      ./gradlew integrationTestObjectStorage -Dscalardb.object_storage.endpoint=http://localhost:10000/test/test-container -Dscalardb.object_storage.username=test -Dscalardb.object_storage.password=test

cosmos:
  - label: cosmos
    label_pretty: Cosmos DB
    runner: windows-latest

    versions:
      - "latest"
      - "2.15.0"
    setup_env: |
      Write-Host "Launching Cosmos DB Emulator"
      Import-Module "$env:ProgramFiles\Azure Cosmos DB Emulator\PSModules\Microsoft.Azure.CosmosDB.Emulator"
      # Set startup timeout to 10min (600s), the default is 4min
      Start-CosmosDbEmulator -Consistency Strong -Timeout 600
    test: ./gradlew.bat integrationTestCosmos "-Dscalardb.cosmos.uri=https://localhost:8081/" "-Dscalardb.cosmos.password=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==" "-Dfile.encoding=UTF-8"
cassandra:
  - label: cassandra
    label_pretty: Cassandra
    setup_env: docker run -d --name cassandra -e MAX_HEAP_SIZE=2048m -e HEAP_NEWSIZE=512m -p 9042:9042 cassandra:${{ matrix.version }}
    versions:
      - "3.0"
      - "3.11"
      - "4.1"
      - "5.0"
    test: ./gradlew integrationTestCassandra

dynamo:
  - label: dynamo
    label_pretty: DynamoDB Local
    setup_env: docker run -d --name dynamodb -p 8000:8000 amazon/dynamodb-local
    test: ./gradlew integrationTestDynamo

jdbc:
  - label: alloydb
    label_pretty: AlloyDB
    setup_env: docker run -d -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -p 5432:5432 google/alloydbomni:${{ matrix.version }}
    versions:
      - "15"
      - "16"
    test: ./gradlew integrationTestJdbc -Dscalardb.jdbc.url=jdbc:postgresql://localhost:5432/ -Dscalardb.jdbc.username=postgres -Dscalardb.jdbc.password=postgres

  - label: db2
    label_pretty: DB2
    setup_env: docker run -d --privileged --name db2 -e DB2INSTANCE=db2inst1 -e DB2INST1_PASSWORD=db2inst1 -p 50000:50000 icr.io/db2_community/db2:${{ matrix.version }}
    versions:
      - "11.5.9.0"
      - "12.1.1.0"
    test: |
      echo "Check if the db2 container is ready"
      while ! docker logs db2 2>&1 | grep -q "Setup has completed"
        do
          echo "Container is not yet ready"
          sleep 5s
        done
      echo "Container is ready"
      ./gradlew integrationTestJdbc -Dscalardb.jdbc.url=jdbc:db2://localhost:50000/test_db -Dscalardb.jdbc.username=db2inst1 -Dscalardb.jdbc.password=db2inst1

  - label: mariadb
    label_pretty: MariaDB
    setup_env: docker run --name mariadb -e MYSQL_ROOT_PASSWORD=mysql -p 3306:3306 -d mariadb:${{ matrix.version }} --character-set-server=utf8mb4 --collation-server=utf8mb4_bin
    versions:
      - "10.11"
      - "11.4"
    test: ./gradlew integrationTestJdbc -Dscalardb.jdbc.url=jdbc:mariadb://localhost:3306 -Dscalardb.jdbc.username=root -Dscalardb.jdbc.password=mysql

  - label: mysql
    label_pretty: MySQL
    setup_env: docker run -d --name mysql -e MYSQL_ROOT_PASSWORD=mysql -p 3306:3306 mysql:${{ matrix.version }} --character-set-server=utf8mb4 --collation-server=utf8mb4_bin
    versions:
      - "5.7"
      - "8.0"
      - "8.4"
    test: ./gradlew integrationTestJdbc -Dscalardb.jdbc.url=jdbc:mysql://localhost:3306/ -Dscalardb.jdbc.username=root -Dscalardb.jdbc.password=mysql

  - label: oracle
    label_pretty: Oracle
    pre_setup_env: docker login ghcr.io -u ${{ github.repository_owner }} --p ${{ secrets.CR_PAT }}
    setup_env: docker run -d --name oracle -p 1521:1521 ghcr.io/scalar-labs/oracle/db-prebuilt:${{ matrix.version }}
    test: declare -A PDB=( ["19"]="ORCLPDB1" ["21"]="XEPDB1" ["23"]="FREEPDB1"); ./gradlew integrationTestJdbc -Dscalardb.jdbc.url=jdbc:oracle:thin:@//localhost:1521/${PDB[${{ matrix.version }}]} -Dscalardb.jdbc.username=SYSTEM -Dscalardb.jdbc.password=Oracle

  - label: postgresql
    label_pretty: PostgreSQL
    setup_env: docker run -d --name postgresql -e POSTGRES_PASSWORD=postgres -p 5432:5432 postgres:${{ matrix.version }}-alpine
    versions:
      - "13"
      - "14"
      - "15"
      - "16"
      - "17"
    test: ./gradlew integrationTestJdbc

  - label: sqlserver
    label_pretty: SQL Server
    setup_env: docker run -d --name sqlserver -e MSSQL_PID=Express -e ACCEPT_EULA=Y -e SA_PASSWORD=SqlServer1 -p 1433:1433 mcr.microsoft.com/mssql/server:${{ matrix.version }}-latest
    versions:
      - "2017"
      - "2019"
      - "2022"
    test: |
      #TODO sqlcmd path may be different in 2017
      docker exec sqlserver /opt/mssql-tools18/bin/sqlcmd -S localhost -C -U sa -P SqlServer1 -Q "CREATE DATABASE test_db COLLATE Japanese_BIN2;"
      ./gradlew integrationTestJdbc -Dscalardb.jdbc.url=jdbc:sqlserver://localhost:1433;databaseName=test_db;encrypt=true;trustServerCertificate=true -Dscalardb.jdbc.username=sa -Dscalardb.jdbc.password=SqlServer1

  - label: tidb
    label_pretty: TiDB
    versions:
      - "v6.5"
      - "v7.5"
      - "v8.5"
    setup_env: |
      echo "Install TiUP\n"
      curl --proto '=https' --tlsv1.2 -sSf https://tiup-mirrors.pingcap.com/install.sh | sh
      echo "$HOME/.tiup/bin" >> $GITHUB_PATH
      echo "\nTiUP installation complete\n"
      echo "Start TiDB\n"
      tiup playground ${{ matrix.version}} --db 1 --pd 1 --kv 1 --tiflash 0 --without-monitor > tiup.log 2>&1 &
    test: |
      # Check if TiDB is running
      while true; do
        if mysql -h 127.0.0.1 -P 4000 -u root -e "SELECT 1" > /dev/null 2>&1; then
          echo "TiDB is ready"
          break
        fi
        echo "Waiting for TiDB to be ready..."
        sleep 5
      done
      ./gradlew integrationTestJdbc -Dscalardb.jdbc.url=jdbc:mysql://localhost:4000 -Dscalardb.jdbc.username=root

  - label: yugabytedb
    label_pretty: YugabyteDB 2
    setup_env: "docker run -p 5433:5433 -e YSQL_USER=yugabyte -e YSQL_PASSWORD=yugabyte -d yugabytedb/yugabyte:2.20.4.0-b50 bin/yugabyted start --background=false --master_flag=\"ysql_enable_db_catalog_version_mode=false\" --tserver_flags=\"ysql_enable_db_catalog_version_mode=false\""
    test: ./gradlew integrationTestJdbc -Dscalardb.jdbc.url=jdbc:yugabytedb://localhost:5433/?load-balance=any -Dscalardb.jdbc.username=yugabyte -Dscalardb.jdbc.password=yugabyte -Dscalar.db.jdbc.connection_pool.max_total=12 -Dscalar.db.jdbc.table_metadata.connection_pool.max_total=4 -Dscalar.db.jdbc.admin.connection_pool.max_total=4

multistorage:
    - label: multi-storage
      label_pretty: Multi Storage
      setup_env: |
        docker run -d --name postgresql -e POSTGRES_PASSWORD=postgres -p 5432:5432 postgres:17-alpine
        docker run -d --name cassandra -e MAX_HEAP_SIZE=2048m -e HEAP_NEWSIZE=512m -p 9042:9042 cassandra:3.11
      test: ./gradlew integrationTestMultiStorage


