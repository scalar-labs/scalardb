name: Update THIRD-PARTY-NOTICES.txt

on:
  schedule:
    # Run quarterly: 01:00 UTC (10:00 JST) on the 1st of January, April, July, and October.
    - cron: "0 1 1 1,4,7,10 *"
  workflow_dispatch:

jobs:
  update-third-party-notices:
    name: Update THIRD-PARTY-NOTICES.txt
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check license
        run: ./gradlew checkLicense

      - name: Generate license report
        run: ./gradlew generateLicenseReport

      - name: Overwrite THIRD-PARTY-NOTICES.txt
        run: cp build/reports/dependency-license/THIRD-PARTY-NOTICES.txt licenses/THIRD-PARTY-NOTICES.txt

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet licenses/THIRD-PARTY-NOTICES.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip pull request creation
        if: steps.diff.outputs.changed == 'false'
        run: echo "No changes detected in licenses/THIRD-PARTY-NOTICES.txt. Skipping pull request creation."

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update-third-party-notices-$(date +%Y%m%d)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # This intentionally fails if the branch already exists, which means
          # a prior run's PR has not been merged yet.
          git switch -c "${BRANCH}"
          git add licenses/THIRD-PARTY-NOTICES.txt
          git commit -m "Update THIRD-PARTY-NOTICES.txt"
          git push -u origin "${BRANCH}"

          gh pr create \
            --base master \
            --head "${BRANCH}" \
            --title "Update THIRD-PARTY-NOTICES.txt" \
            --body "This PR updates \`licenses/THIRD-PARTY-NOTICES.txt\` based on the latest dependency license report generated by \`./gradlew generateLicenseReport\`." \
            --reviewer "scalar-labs/scalardb"
