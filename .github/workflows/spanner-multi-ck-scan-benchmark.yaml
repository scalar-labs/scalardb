name: Benchmark MultipleClusteringKeyScan thread count (Spanner emulator)
run-name: "Benchmark MultipleClusteringKeyScan thread count"

# Sweep the `scalardb.test.multi_ck_scan.thread_num` override across 1..10 to find
# the sweet spot for JdbcDatabaseMultipleClusteringKeyScanIntegrationTestWithSpanner
# on a standard GitHub-hosted runner against the Spanner emulator.

on:
  workflow_dispatch:
env:
  SPANNER_JDBC_URL: "jdbc:cloudspanner://localhost:9010/projects/emulator-project/instances/test-instance/databases/test-db;autoConfigEmulator=true;dialect=POSTGRESQL"

jobs:
  benchmark:
    name: "thread_num=${{ matrix.thread_num }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        thread_num: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - name: Install Spanner emulator
        run: |
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.asc] https://packages.cloud.google.com/apt cloud-sdk main" \
            | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg \
            | sudo tee /usr/share/keyrings/cloud.google.asc > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-cloud-cli-spanner-emulator

      - name: Start Spanner emulator
        run: |
          EMULATOR_DIR=/usr/lib/google-cloud-sdk/bin/cloud_spanner_emulator
          ${EMULATOR_DIR}/gateway_main \
            --hostname 0.0.0.0 \
            --grpc_port 9010 \
            --http_port 9020 \
            --grpc_binary ${EMULATOR_DIR}/emulator_main \
            &

      - name: Wait for Spanner emulator to be ready
        run: |
          SECONDS=0
          until curl -sf http://localhost:9020/v1/projects/emulator-project/instances > /dev/null 2>&1; do
            if (( SECONDS > 60 )); then
              echo "Timeout: Spanner emulator failed to start within 60 seconds"
              exit 1
            fi
            echo "Waiting for Spanner emulator..."
            sleep 2
          done
          echo "Spanner emulator is ready"

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: 8
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run MultipleClusteringKeyScanIntegrationTestWithSpanner (thread_num=${{ matrix.thread_num }})
        id: bench
        run: |
          START_TS=$(date +%s)
          ./gradlew core:integrationTestJdbc \
            --tests JdbcDatabaseMultipleClusteringKeyScanIntegrationTestWithSpanner \
            "-Dscalardb.jdbc.url=${{ env.SPANNER_JDBC_URL }}" \
            "-Dscalardb.jdbc.username=" \
            "-Dscalardb.jdbc.password=" \
            "-Dscalardb.test.multi_ck_scan.thread_num=${{ matrix.thread_num }}"
          END_TS=$(date +%s)
          DURATION=$((END_TS - START_TS))
          # Human-readable formatting: "Xh Ym Zs", omitting leading zero units.
          H=$((DURATION / 3600))
          M=$(((DURATION % 3600) / 60))
          S=$((DURATION % 60))
          if [ "$H" -gt 0 ]; then
            PRETTY="${H}h ${M}m ${S}s"
          elif [ "$M" -gt 0 ]; then
            PRETTY="${M}m ${S}s"
          else
            PRETTY="${S}s"
          fi
          echo "duration_seconds=${DURATION}" >> "$GITHUB_OUTPUT"
          echo "duration_pretty=${PRETTY}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Benchmark result::thread_num=${{ matrix.thread_num }} duration=${PRETTY} (${DURATION}s)"

      - name: Write per-job summary
        if: always()
        run: |
          echo "### Benchmark: thread_num=${{ matrix.thread_num }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Duration: **${{ steps.bench.outputs.duration_pretty }}** (${{ steps.bench.outputs.duration_seconds }}s)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: **${{ steps.bench.outcome }}**" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: multi_ck_scan_thread_${{ matrix.thread_num }}_report
          path: core/build/reports/tests/
